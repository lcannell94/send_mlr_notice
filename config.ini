# Email sender configuration for send_mlr_notice

# Display From header shown to recipients
from: "MLR Notice <notice@example.com>"

# Envelope sender (-f flag passed to sendmail)
envelope_from: notice@example.com

# Subject line for outgoing messages
subject: "Notice"

# When a line in the names file has no @, build address as localpart@email_domain
email_domain: example.com

# Path to sendmail binary
sendmail: /usr/sbin/sendmail
